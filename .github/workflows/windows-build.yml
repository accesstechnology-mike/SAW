name: Windows build probe

on:
  push:
    branches:
      - master
      - probe/windows-ci-build
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Restore and build SAW on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Install legacy DirectX runtime
        shell: pwsh
        run: |
          choco install directx -y --no-progress
          $managedDirectXPath = 'C:\Windows\Microsoft.NET\DirectX for Managed Code\1.0.2902.0'
          if (Test-Path $managedDirectXPath) {
            Get-ChildItem $managedDirectXPath | Select-Object Name, Length
          } else {
            Write-Host "Managed DirectX path not found: $managedDirectXPath"
          }

      - name: Show build environment
        shell: pwsh
        run: |
          dotnet --info
          nuget help | Select-Object -First 20
          msbuild -version

      - name: Restore NuGet packages for main app
        shell: pwsh
        run: |
          nuget restore SAW/SAW.csproj -PackagesDirectory packages -NonInteractive -Verbosity detailed

      - name: Build main app Debug x86
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          msbuild SAW/SAW.csproj `
            /m `
            /p:Configuration=Debug `
            /p:Platform=x86 `
            /p:RestorePackages=false `
            /v:minimal `
            /bl:artifacts/saw-main-debug-x86.binlog

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saw-build-binlog
          path: artifacts/*.binlog
          if-no-files-found: ignore
